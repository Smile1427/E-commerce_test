# pytest.ini
[pytest]
# 测试发现规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行参数
addopts =
    -v
    -s
    --alluredir=./reports/allure_raw
    --clean-alluredir
    --tb=short
    --strict-markers

# 标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    p0: P0级别核心用例
    slow: 慢速测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %H:%M:%S