name: API Automation Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # 每天凌晨 2 点自动运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start Mock Server
      run: |
        python mock_server.py &
        sleep 5  # 等待服务器启动

    - name: Run business tests
      run: |
        pytest testcases/business/ -v --alluredir=./reports/allure_raw

    - name: Run environment tests
      run: |
        pytest testcases/environments/ -v --alluredir=./reports/allure_raw --ignore=testcases/environments/test_reqres.py

    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ matrix.python-version }}
        path: reports/allure_raw

    - name: Install Allure commandline
      if: always()
      run: |
        sudo apt-get update
        sudo apt-get install -y allure

    - name: Generate Allure Report
      if: always()
      run: |
        allure generate ./reports/allure_raw -o ./reports/allure_html --clean

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report-${{ matrix.python-version }}
        path: reports/allure_html

  # 部署报告到 GitHub Pages
  deploy-report:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - name: Download Allure results
      uses: actions/download-artifact@v4
      with:
        name: allure-results-3.12
        path: allure-results

    - name: Generate Allure Report
      run: |
        npm install -g allure-commandline
        allure generate allure-results -o allure-report --clean

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: allure-report