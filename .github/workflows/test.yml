name: API Automation Tests

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        # pytest 会自动通过 conftest.py 启动 Mock 服务器
        pytest testcases/business/ -v --alluredir=./reports/allure_raw || true
        pytest testcases/environments/ -v --alluredir=./reports/allure_raw --ignore=testcases/environments/test_reqres.py || true

    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: reports/allure_raw