name: API Automation Tests

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests (Mock server will be started by tests if needed)
      run: |
        # 如果测试需要 Mock 服务器，先启动
        python mock_server.py &
        sleep 5
        pytest testcases/ -v --alluredir=./reports/allure_raw --ignore=testcases/environments/test_reqres.py

    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: reports/allure_raw